<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatik Quiz</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        #root {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .quiz-title {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .quiz-subtitle {
            color: #64748b;
            font-size: 1.1em;
        }
        
        .loading {
            text-align: center;
            padding: 60px 40px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e2e8f0;
            border-top: 6px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #64748b;
            font-size: 1.2em;
        }
        
        .error-container {
            text-align: center;
            padding: 40px;
        }
        
        .error-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .error-message {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        
        .error-message h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .error-message p {
            margin: 10px 0;
            line-height: 1.6;
        }
        
        .error-message strong {
            color: #7f1d1d;
        }
        
        .instruction-box {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        
        .instruction-box h4 {
            color: #1e40af;
            margin-bottom: 10px;
        }
        
        .instruction-box ol {
            margin-left: 20px;
            color: #1e40af;
        }
        
        .instruction-box li {
            margin: 8px 0;
            line-height: 1.5;
        }
        
        .progress-bar {
            background: #e2e8f0;
            height: 12px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .question-card {
            background: #f8fafc;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }
        
        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 1.3em;
            color: #1e293b;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .answers-grid {
            display: grid;
            gap: 15px;
        }
        
        .answer-button {
            background: white;
            border: 3px solid #e2e8f0;
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .answer-button:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .answer-button.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .answer-button.correct {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .answer-button.incorrect {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .answer-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .answer-letter {
            background: #e2e8f0;
            color: #475569;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .answer-button.selected .answer-letter {
            background: white;
            color: #667eea;
        }
        
        .answer-button.correct .answer-letter,
        .answer-button.incorrect .answer-letter {
            background: white;
            color: inherit;
        }
        
        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .feedback.correct {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #065f46;
        }
        
        .feedback.incorrect {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        
        .feedback-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-card {
            text-align: center;
        }
        
        .results-score {
            font-size: 5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 30px 0;
        }
        
        .results-message {
            font-size: 1.5em;
            color: #475569;
            margin-bottom: 20px;
        }
        
        .results-details {
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        .results-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .results-stat:last-child {
            border-bottom: none;
        }
        
        .results-label {
            color: #64748b;
            font-weight: 600;
        }
        
        .results-value {
            color: #1e293b;
            font-weight: bold;
        }
        
        .file-info {
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }
        
        .file-info strong {
            color: #475569;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function QuizApp() {
            const [quizData, setQuizData] = useState(null);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [quizCompleted, setQuizCompleted] = useState(false);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [fileName, setFileName] = useState('quiz_fragen.json');

            // Automatisches Laden beim Start
            useEffect(() => {
                loadQuizFromURL();
            }, []);

            const loadQuizFromURL = async () => {
                setLoading(true);
                setError(null);

                // Prüfe, ob eine Datei als URL-Parameter angegeben wurde
                // Beispiel: quiz_app_auto.html?file=quiz_python.json
                const urlParams = new URLSearchParams(window.location.search);
                const fileParam = urlParams.get('file');
                const fileToLoad = fileParam || 'quiz_fragen.json';
                
                setFileName(fileToLoad);

                try {
                    const response = await fetch(fileToLoad);
                    
                    if (!response.ok) {
                        throw new Error(`Datei "${fileToLoad}" wurde nicht gefunden.`);
                    }
                    
                    const data = await response.json();
                    
                    // Validierung
                    if (!data.title || !data.questions || !Array.isArray(data.questions)) {
                        throw new Error('Ungültiges JSON-Format. Die Datei muss "title" und "questions" enthalten.');
                    }

                    if (data.questions.length === 0) {
                        throw new Error('Die Quiz-Datei enthält keine Fragen.');
                    }

                    setQuizData(data);
                    setLoading(false);
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            const resetQuiz = () => {
                setCurrentQuestion(0);
                setSelectedAnswer(null);
                setShowFeedback(false);
                setScore(0);
                setQuizCompleted(false);
            };

            // Loading State
            if (loading) {
                return (
                    <div className="quiz-container">
                        <div className="loading">
                            <div className="loading-spinner"></div>
                            <div className="loading-text">Quiz wird geladen...</div>
                        </div>
                    </div>
                );
            }

            // Error State
            if (error) {
                return (
                    <div className="quiz-container">
                        <div className="error-container">
                            <div className="error-icon">⚠️</div>
                            <div className="error-message">
                                <h3>Quiz konnte nicht geladen werden</h3>
                                <p><strong>Fehler:</strong> {error}</p>
                                <p><strong>Gesuchte Datei:</strong> {fileName}</p>
                            </div>
                            
                            <div className="instruction-box">
                                <h4>💡 So beheben Sie das Problem:</h4>
                                <ol>
                                    <li>Stellen Sie sicher, dass die Datei <strong>{fileName}</strong> im gleichen Ordner wie diese HTML-Datei liegt</li>
                                    <li>Prüfen Sie, ob der Dateiname exakt übereinstimmt (Gross-/Kleinschreibung beachten!)</li>
                                    <li>Öffnen Sie die JSON-Datei und prüfen Sie auf Fehler (z.B. mit jsonlint.com)</li>
                                    <li>Versuchen Sie es mit einer anderen JSON-Datei: <code>quiz_app_auto.html?file=ihre_datei.json</code></li>
                                </ol>
                            </div>
                        </div>
                    </div>
                );
            }

            const question = quizData.questions[currentQuestion];
            const progress = ((currentQuestion + 1) / quizData.questions.length) * 100;

            const handleAnswerClick = (index) => {
                if (showFeedback) return;
                setSelectedAnswer(index);
            };

            const handleSubmit = () => {
                if (selectedAnswer === null) return;
                
                setShowFeedback(true);
                const isCorrect = question.answers[selectedAnswer].correct;
                
                if (isCorrect) {
                    setScore(score + 1);
                }
            };

            const handleNext = () => {
                if (currentQuestion < quizData.questions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setSelectedAnswer(null);
                    setShowFeedback(false);
                } else {
                    setQuizCompleted(true);
                }
            };

            // Results Screen
            if (quizCompleted) {
                const percentage = Math.round((score / quizData.questions.length) * 100);
                let message = "";
                let emoji = "";
                
                if (percentage >= 90) {
                    message = "Ausgezeichnet!";
                    emoji = "🏆";
                } else if (percentage >= 70) {
                    message = "Sehr gut!";
                    emoji = "🎉";
                } else if (percentage >= 50) {
                    message = "Gut gemacht!";
                    emoji = "👍";
                } else {
                    message = "Weiter üben!";
                    emoji = "💪";
                }

                return (
                    <div className="quiz-container">
                        <div className="results-card">
                            <h1 className="quiz-title">{emoji} Quiz abgeschlossen!</h1>
                            <div className="results-score">{percentage}%</div>
                            <div className="results-message">{message}</div>
                            
                            <div className="results-details">
                                <div className="results-stat">
                                    <span className="results-label">Richtige Antworten:</span>
                                    <span className="results-value">{score} von {quizData.questions.length}</span>
                                </div>
                                <div className="results-stat">
                                    <span className="results-label">Falsche Antworten:</span>
                                    <span className="results-value">{quizData.questions.length - score}</span>
                                </div>
                                <div className="results-stat">
                                    <span className="results-label">Erfolgsquote:</span>
                                    <span className="results-value">{percentage}%</span>
                                </div>
                            </div>
                            
                            <div className="control-buttons">
                                <button className="btn btn-primary" onClick={resetQuiz}>
                                    🔄 Nochmal versuchen
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Quiz Screen
            return (
                <div className="quiz-container">
                    <div className="quiz-header">
                        <h1 className="quiz-title">{quizData.title}</h1>
                        <p className="quiz-subtitle">{quizData.subtitle}</p>
                    </div>

                    <div className="file-info">
                        📁 Geladene Datei: <strong>{fileName}</strong>
                    </div>

                    <div className="progress-bar">
                        <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                    </div>

                    <div className="question-card">
                        <div className="question-number">
                            Frage {currentQuestion + 1} von {quizData.questions.length}
                        </div>
                        <div className="question-text">
                            {question.question}
                        </div>

                        <div className="answers-grid">
                            {question.answers.map((answer, index) => {
                                let className = "answer-button";
                                
                                if (showFeedback) {
                                    if (answer.correct) {
                                        className += " correct";
                                    } else if (selectedAnswer === index) {
                                        className += " incorrect";
                                    }
                                } else if (selectedAnswer === index) {
                                    className += " selected";
                                }

                                return (
                                    <button
                                        key={index}
                                        className={className}
                                        onClick={() => handleAnswerClick(index)}
                                        disabled={showFeedback}
                                    >
                                        <span className="answer-letter">
                                            {String.fromCharCode(65 + index)}
                                        </span>
                                        <span>{answer.text}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {showFeedback && (
                            <div className={`feedback ${question.answers[selectedAnswer].correct ? 'correct' : 'incorrect'}`}>
                                <div className="feedback-title">
                                    <span>
                                        {question.answers[selectedAnswer].correct ? '✅' : '❌'}
                                    </span>
                                    {question.answers[selectedAnswer].correct ? 'Richtig!' : 'Leider falsch'}
                                </div>
                                <p>{question.explanation}</p>
                            </div>
                        )}
                    </div>

                    <div className="control-buttons">
                        {!showFeedback ? (
                            <button 
                                className="btn btn-primary" 
                                onClick={handleSubmit}
                                disabled={selectedAnswer === null}
                            >
                                Antwort prüfen
                            </button>
                        ) : (
                            <button className="btn btn-primary" onClick={handleNext}>
                                {currentQuestion < quizData.questions.length - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<QuizApp />, document.getElementById('root'));
    </script>
</body>
</html>
